<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Portugal Uni Finder AI</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .header-container { text-align: center; margin: 20px 0; }
        .logo { max-width: 150px; height: auto; border-radius: 8px; }
        nav { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; align-items: center; }
        .card { background: #161b22; padding: 15px; border-radius: 10px; margin: 10px; color: white; border: 1px solid #30363d; }
        .btn { display: block; background: #25d366; color: white; padding: 10px; text-align: center; text-decoration: none; border-radius: 5px; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header-container">
        <img src="logo.png" alt="Logo SJ Travel" class="logo">
        <h1>Portugal Uni Finder AI</h1>
    </div>

    <nav>
        <button onclick="window.location.href='/'">Explorar</button>
        <select id="filtroPreco" onchange="ordenarPorPreco()" style="padding: 8px; border-radius: 5px;">
            <option value="todos">Ordenar por Preço</option>
            <option value="baratas">Propinas mais baratas</option>
        </select>
        <button onclick="window.location.href='/contacto.html'">SJ Travel</button>
    </nav>

    <div id="container"></div>

    <script>
        let dadosGlobais = [];
        fetch('/api/dados').then(r => r.json()).then(d => {
            dadosGlobais = d.noticias;
            renderizar(dadosGlobais);
        });

        function renderizar(lista) {
            document.getElementById('container').innerHTML = lista.map(n => `
                <div class="card">
                    <h2>${n.titulo}</h2>
                    <p>${n.descricao}</p>
                    <p>Propina: <b>${n.propina}€</b> | Visto: ${n.tempo_visto}</p>
                    <a href="https://wa.me/244976195484" class="btn">Assistência SJ Travel</a>
                </div>`).join('');
        }

        function ordenarPorPreco() {
            const filtro = document.getElementById('filtroPreco').value;
            if (filtro === 'baratas') {
                const ordenado = [...dadosGlobais].sort((a, b) => a.propina - b.propina);
                renderizar(ordenado);
            } else {
                renderizar(dadosGlobais);
            }
        }
    </script>
</body>
</html>
