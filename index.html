<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portugal Uni Finder AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header-container">
        <h1>Portugal Uni Finder AI</h1>
        <p>Encontre a sua Universidade em Portugal</p>
    </div>

    <!-- Filtros -->
    <div class="filtro-box">
        <h3>🔍 FILTROS AVANÇADOS</h3>
        <label>PROPINA MÁXIMA (<span id="valPropina">8000</span>€)</label>
        <input type="range" min="2000" max="10000" value="8000" style="width: 100%;" oninput="document.getElementById('valPropina').innerText = this.value">
        <button onclick="alert('Robô Sync Ativado!')" class="btn-robo">🔍 Iniciar Robô Sync</button>
    </div>

    <!-- Notificações Dinâmicas -->
    <div id="blocoNotificacoes" class="card notif-card">
        <h3>🔔 ALERTAS DO SINCRONIZADOR DIÁRIO</h3>
        <div class="push-box">
            <p id="display-alerta">Carregando novidades...</p>
            <button class="btn-detalhes" onclick="esconderNotificacoes()">Ligar Push</button>
        </div>
    </div>

    <div id="container"></div>

    <!-- Rodapé -->
    <footer>
        <div class="footer-links">
            <a href="#" onclick="window.location.reload()">Explorar</a> | 
            <a href="#" onclick="abrirConsultorIA()">Consultor IA</a> | 
            <a href="#" onclick="executarComparador()">Comparador</a>
        </div>
        <p><strong>Portugal Uni Finder AI</strong> © 2026. Desenvolvido por Simão Sérgio Sungo Púcuta.</p>
    </footer>

    <script>
        const dados = [
            { titulo: "Universidade do Porto", tipo: "Pública", propina: "3500", score: "85" },
            { titulo: "ISAG - Business School", tipo: "Privada", propina: "3450", score: "90" },
            { titulo: "Bolsa de Mérito - U. Porto", tipo: "Bolsa", propina: "0", score: "98" },
            { titulo: "UC Isolada: IA", tipo: "Cadeira Isolada", propina: "700", score: "98" }
            // ... (Continua a tua lista de 30 itens aqui)
        ];

        // Lógica de Notificações Aleatórias
        const alertas = ["Nova fase no ISAG aberta!", "Propina ULisboa atualizada.", "Bolsas de Mérito disponíveis."];
        document.getElementById('display-alerta').innerText = alertas[Math.floor(Math.random() * alertas.length)];

        function esconderNotificacoes() { document.getElementById('blocoNotificacoes').style.display = 'none'; }
        
        function abrirConsultorIA() { window.open('https://wa.me/244976195484', '_blank'); }

        function executarComparador() { 
            dados.sort((a, b) => b.score - a.score); 
            renderizar(dados); 
        }

        function renderizar(lista) {
            document.getElementById('container').innerHTML = lista.map((n, i) => `
                <div class="card">
                    <span class="badge">${n.tipo}</span>
                    <h2>${n.titulo}</h2>
                    <p>Propina: ${n.propina}€ | Score: ${n.score}/100</p>
                    <button class="btn-detalhes" onclick="abrirDetalhes(${i})">Ver Detalhes e Contacto</button>
                </div>`).join('');
        }

        function abrirDetalhes(i) {
            const n = dados[i];
            alert(`DETALHES: ${n.titulo}\nTipo: ${n.tipo}\nPropina: ${n.propina}€\n\nContactar responsáveis agora:`);
            abrirConsultorIA();
        }

        renderizar(dados);
    </script>
</body>
</html>
