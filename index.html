<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portugal Uni Finder AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header-container">
        <h1>Portugal Uni Finder AI</h1>
        <p>Encontre a sua Universidade em Portugal</p>
    </div>

    <!-- Filtros e Robô Sync (Mantidos) -->
    <div class="filtro-box">
        <h3>🔍 FILTROS AVANÇADOS</h3>
        <label>PROPINA MÁXIMA (<span id="valPropina">8000</span>€)</label>
        <input type="range" min="2000" max="10000" value="8000" style="width: 100%;" oninput="document.getElementById('valPropina').innerText = this.value">
        <button onclick="alert('Robô Sync Ativado!')" class="btn-robo">🔍 Iniciar Robô Sync</button>
    </div>

    <div id="container"></div>

    <!-- Modal para Detalhes e Mapa -->
    <div id="modalDetalhes" class="modal">
        <div class="modal-content">
            <h2 id="modalTitulo"></h2>
            <iframe id="modalMapa" src="" width="100%" height="250" style="border:0;" allowfullscreen=""></iframe>
            <button onclick="document.getElementById('modalDetalhes').style.display='none'" class="btn-fechar">Fechar</button>
        </div>
    </div>

    <script>
        const dados = [
            { titulo: "Universidade do Porto", tipo: "Pública", propina: "3500", resposta: "20 dias", taxa: "100", score: "75", mapa: "https://www.google.com/maps/embed?pb=..." },
            { titulo: "ISAG - Business School", tipo: "Privada", propina: "3450", resposta: "7 dias", taxa: "120", score: "90", mapa: "https://www.google.com/maps/embed?pb=..." }
        ];

        document.getElementById('container').innerHTML = dados.map(n => `
            <div class="card">
                <span class="badge">${n.tipo}</span>
                <h2>${n.titulo}</h2>
                <div class="stats">
                    <div class="stat-box"><strong>PROPINA</strong><br>${n.propina}€</div>
                    <div class="stat-box"><strong>RESPOSTA</strong><br>${n.resposta}</div>
                    <div class="stat-box"><strong>TAXA</strong><br>${n.taxa}€</div>
                </div>
                <div style="text-align: right; margin-bottom: 10px; font-weight: bold;">Score: ${n.score}/100</div>
                <button class="btn-detalhes" onclick="abrirModal('${n.titulo}', '${n.mapa}')">Ver Detalhes > </button>
                <a href="https://wa.me/244976195484" class="btn-wpp">Assistência SJ Travel</a>
            </div>`).join('');

        function abrirModal(titulo, link) {
            document.getElementById('modalTitulo').innerText = titulo;
            document.getElementById('modalMapa').src = link;
            document.getElementById('modalDetalhes').style.display = 'block';
        }
    </script>
</body>
</html>
