<!DOCTYPE html>
<html lang="pt">
<head>
    <link rel="stylesheet" href="style.css">
    <title>Portugal Uni Finder AI</title>
</head>
<body>
    <h1>Portugal Uni Finder AI</h1>
    <nav>
        <button class="nav-btn">Explorar</button>
        <button class="nav-btn">Consultor IA</button>
        <button class="nav-btn">Comparador</button>
        <button class="nav-btn" style="background-color: #4a90e2; color: white;">Robô Sync</button>
        <div class="sino-container">🔔<span class="badge">1</span></div>
    </nav>

    <div id="noticias-container"></div>

    <script>
        fetch('/api/dados')
            .then(res => res.json())
            .then(dados => {
                const container = document.getElementById('noticias-container');
                dados.noticias.forEach(n => {
                    container.innerHTML += `<div class="card"><h2>${n.titulo}</h2><p>${n.descricao}</p></div>`;
                });
            });
    </script>
</body>
</html>
