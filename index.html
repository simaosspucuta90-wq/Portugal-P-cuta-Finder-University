<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portugal Uni Finder AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header-container">
        <h1>Portugal Uni Finder AI</h1>
        <p>Encontre a sua Universidade em Portugal</p>
    </div>

    <!-- Filtro Versátil (Expansível/Retrátil) -->
    <div class="card filtro-card">
        <div class="filtro-header" onclick="toggleFiltros()">
            <h3>🔍 FILTROS AVANÇADOS</h3>
            <span id="setaFiltro">▼</span>
        </div>
        <div id="corpoFiltros" style="display: none;">
            <label>CIDADE</label>
            <select><option>Todas</option><option>Lisboa</option><option>Porto</option></select>
            <label>PROPINA ANUAL (2.000€ - 10.000€)</label>
            <input type="range" min="2000" max="10000" style="width: 100%;">
            <div class="checkbox-group">
                <label><input type="checkbox"> Facilidades CPLP</label>
                <label><input type="checkbox"> Unidades Curriculares Isoladas</label>
            </div>
        </div>
    </div>

    <!-- Notificações Dinâmicas -->
    <div id="blocoNotificacoes" class="card notif-card">
        <h3>🔔 ALERTAS DO SINCRONIZADOR</h3>
        <p id="display-alerta">Carregando novidades...</p>
        <button class="btn-detalhes" onclick="esconderNotificacoes()">Ligar Push</button>
    </div>

    <div id="container"></div>

    <footer>
        <div class="footer-links">
            <a href="#" onclick="window.location.reload()">Explorar</a> | 
            <a href="#" onclick="abrirConsultorIA()">Consultor IA</a> | 
            <a href="#" onclick="executarComparador()">Comparador</a>
        </div>
        <p><strong>Portugal Uni Finder AI</strong> © 2026. Desenvolvido por Simão Sérgio Sungo Púcuta.</p>
    </footer>

    <script>
        const dados = [
            { titulo: "Universidade do Porto", tipo: "Pública", propina: "3500", score: "95", info: "Engenharia de topo." },
            { titulo: "Bolsa de Mérito CPLP", tipo: "Bolsa", propina: "0", score: "98", info: "Isenção total CPLP." },
            { titulo: "UC Isolada: IA", tipo: "Cadeira Isolada", propina: "650", score: "92", info: "Certificado emitido." }
        ];

        // Lógica de Filtro
        function toggleFiltros() {
            const corpo = document.getElementById('corpoFiltros');
            corpo.style.display = corpo.style.display === 'none' ? 'block' : 'none';
        }

        // Lógica de Renderização e Detalhes
        function renderizar(lista) {
            document.getElementById('container').innerHTML = lista.map((n, i) => `
                <div class="card">
                    <span class="badge">${n.tipo}</span>
                    <h2>${n.titulo}</h2>
                    <p>Propina: ${n.propina}€ | Score: ${n.score}/100</p>
                    <button class="btn-detalhes" onclick="abrirDetalhes(${i})">Ver Detalhes e Contacto</button>
                </div>`).join('');
        }

        function abrirDetalhes(i) {
            const n = dados[i];
            alert(`DETALHES: ${n.titulo}\n${n.info}\n\nContactar responsáveis agora:`);
            abrirConsultorIA();
        }

        function abrirConsultorIA() { window.open('https://wa.me/244976195484', '_blank'); }

        function executarComparador() { dados.sort((a, b) => b.score - a.score); renderizar(dados); }

        renderizar(dados);
        document.getElementById('display-alerta').innerText = "Nova fase de candidaturas aberta!";
    </script>
</body>
</html>
