<!DOCTYPE html>
<html lang="pt">
<head><meta charset="UTF-8"><title>Painel Admin</title></head>
<body>
    <h1>Painel Admin - Portugal Uni Finder</h1>
    <form action="/adicionar-noticia" method="POST">
        <input name="titulo" placeholder="Nome da Univ" required><br>
        <input name="tipo" placeholder="Ensino (Pública/Privada)" required><br>
        <input name="propina" placeholder="Valor Propina (€)" type="number" required><br>
        <input name="resposta" placeholder="Tempo de Resposta (ex: 7 dias)" required><br>
        <input name="taxa" placeholder="Taxa Candidatura (€)" type="number" required><br>
        <input name="score" placeholder="Acceptance Score (0-100)" type="number" required><br>
        <textarea name="descricao" placeholder="Detalhes adicionais"></textarea><br>
        <button type="submit">Publicar no Site</button>
    </form>
    <hr>
    <h3>Robô Sync (Automação)</h3>
    <button onclick="alert('O Robô Sync foi ativado! A analisar novos editais e bolsas...')" style="background: blue; color: white; padding: 15px; border: none; cursor: pointer;">
        🔍 Iniciar Busca Automática de Vagas
    </button>
</body>
</html>
